[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/top]
monitor = DP-4
monitor-strict = false
override-redirect = false

tray-position = right
tray-padding = 5
width = 98%
height = 28
padding-left = 1
padding-right = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
border-top-size = 7
border-bottom-size = 7
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}
offset-x = 1%
offset-y = 0.5%
fixed-center = true
line-size = 2
wm-restack = bspwm

modules-left = filesystem round-left bspwm round-right
modules-center = temperature space space memory space space cpu space space nvidia-memory space space nvidia space space storage space space uptime space space processes
modules-right = battery xbacklight alsa xkeyboard round-left time round-right space wlan space bluetooth-round-left bluetooth bluetooth-round-right space powermenu

font-0 = CaskaydiaMono Nerd Font:style=Bold:pixelsize=13;3
font-1 = CaskaydiaMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;

[bar/second]
monitor = DP-2
monitor-strict = false
override-redirect = false

width = 98%
height = 28
padding-left = 1
padding-right = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
border-top-size = 7
border-bottom-size = 7
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}
offset-x = 1%
offset-y = 0.5%
fixed-center = true
line-size = 3

modules-left = filesystem round-left bspwm round-right
modules-right = weather

font-0 = CaskaydiaMono Nerd Font:style=Bold:pixelsize=13;3
font-1 = CaskaydiaMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;

[bar/third]
monitor = HDMI-0
monitor-strict = false
override-redirect = false

width = 98%
height = 28
padding-left = 1
padding-right = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
border-top-size = 7
border-bottom-size = 7
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}
offset-x = 1%
offset-y = 0.5%
fixed-center = true
line-size = 3

modules-left = filesystem round-left bspwm round-right
modules-right = weather round-left time round-right space space

font-0 = CaskaydiaMono Nerd Font:style=Bold:pixelsize=13;3
font-1 = CaskaydiaMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;
